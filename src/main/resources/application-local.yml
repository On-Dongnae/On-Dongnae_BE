spring:
  # PostgreSQL (로컬 Docker)
  datasource:
    url: jdbc:postgresql://localhost:5432/on_dongnae
    username: odn_user
    password: odn_pass
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 20000

  # JPA (로컬)
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  # Redis (로컬 Docker)
  data:
    redis:
      host: localhost
      port: 6379

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.type.descriptor.sql.BasicBinder: trace
