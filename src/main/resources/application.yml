spring:
  application:
    name: on-dongnae

  profiles:
    active: local   # local | prod

  # JPA (공통)
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    properties:
      hibernate:
        format_sql: true
    show-sql: ${JPA_SHOW_SQL:true}
    open-in-view: false

server:
  port: ${SERVER_PORT:8080}
